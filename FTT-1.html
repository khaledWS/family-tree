<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>شجرة خالد</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #f7f2e8;
    --paper: #fffbf2;
    --ink: #2a2419;
    --muted: #7a6f5c;
    --brown: #8b6f47;
    --brown-dark: #5f4a2b;
    --green-dark: #1f4327;
    --gold: #c69b4a;
    --line: #d8c9a8;
    --male: #e8edf2;
    --male-border: #5b7290;
    --female: #f7e6ea;
    --female-border: #a04a6a;
}
* { box-sizing: border-box; }
html, body {
    margin: 0; padding: 0;
    height: 100%; width: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Tajawal', 'Segoe UI', Tahoma, sans-serif;
}
#viewport {
    position: fixed; inset: 0;
    overflow: hidden;
    cursor: grab;
    background:
        repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(139,111,71,0.04) 20px, rgba(139,111,71,0.04) 21px),
        var(--paper);
}
#viewport.dragging { cursor: grabbing; }
#viewport.dragging * { pointer-events: none; }
#canvas {
    position: absolute;
    top: 0; left: 0;
    transform-origin: 0 0;
    will-change: transform;
    padding: 60px;
    display: flex;
    gap: 60px;
    align-items: flex-start;
}
.tree-block { display: inline-block; }
.tree-block + .tree-block {
    border-right: 2px dashed var(--gold);
    padding-right: 60px;
    margin-right: 0;
}
.tree, .tree ul { margin: 0; padding: 0; list-style: none; }
.tree { text-align: center; direction: ltr; }
.tree ul { display: flex; justify-content: center; padding-top: 30px; position: relative; }
.tree ul::before {
    content: ''; position: absolute; top: 0; left: 50%;
    width: 0; height: 15px; border-left: 2px solid var(--brown);
}
.tree > ul:first-of-type::before { display: none; }
.tree li {
    position: relative; padding: 30px 8px 0 8px; flex: none;
}
.tree li::before, .tree li::after {
    content: ''; position: absolute; top: 15px; height: 15px;
    border-top: 2px solid var(--brown);
}
.tree li::before { right: 50%; left: 0; border-right: 2px solid var(--brown); }
.tree li::after  { left: 50%; right: 0; }
.tree li:only-child::before, .tree li:only-child::after { display: none; }
.tree li:first-child::before, .tree li:last-child::after { border: 0 none; }
.tree li:last-child::before { border-right: 2px solid var(--brown); border-radius: 0 5px 0 0; }
.tree li:first-child::after { border-left: 2px solid var(--brown); border-radius: 5px 0 0 0; }
.tree > ul > li::before, .tree > ul > li::after { display: none; }
.tree > ul > li { padding-top: 0; }
.node-wrap { display: inline-flex; gap: 6px; align-items: stretch; direction: rtl; }
.node-card {
    display: inline-block;
    min-width: 140px;
    padding: 10px 12px;
    border-radius: 8px;
    border: 2px solid var(--male-border);
    background: var(--male);
    box-shadow: 0 1px 3px rgba(60,40,10,0.08), 0 4px 12px rgba(60,40,10,0.06);
    text-align: center;
    cursor: help;
    user-select: none;
    transition: transform 0.1s;
}
.node-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(60,40,10,0.18);
}
.node-card.g-f { background: var(--female); border-color: var(--female-border); }
.node-card.has-mother-stripe {
    border-top: 5px solid var(--mother-color, var(--brown));
    padding-top: 6px;
}
.card-photo {
    display: block;
    width: 60px; height: 60px;
    object-fit: cover;
    border-radius: 50%;
    margin: 0 auto 6px;
    border: 2px solid var(--gold);
    background: #fff;
}
.card-name { font-family: 'Amiri', serif; font-weight: 700; font-size: 1.05rem; color: var(--brown-dark); }
.card-life { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
.card-origin { font-size: 0.75rem; color: var(--green-dark); margin-top: 2px; }
.card-mother {
    font-size: 0.7rem;
    color: var(--mother-color, var(--muted));
    margin-top: 3px;
    font-weight: 500;
}

#controls {
    position: fixed; top: 14px; right: 14px;
    z-index: 100;
    display: flex; gap: 4px; align-items: center;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 6px;
    box-shadow: 0 2px 8px rgba(60,40,10,0.15);
    direction: ltr;
}
#controls button {
    width: 34px; height: 34px;
    border: 1px solid var(--line);
    background: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1.1rem;
    font-family: inherit;
    color: var(--brown-dark);
    padding: 0;
    transition: background 0.1s;
}
#controls button:hover { background: #efe6d0; }
#controls button:active { background: #e0d3b3; }
#z-pct {
    min-width: 52px;
    text-align: center;
    font-size: 0.85rem;
    color: var(--brown-dark);
    padding: 0 8px;
    font-variant-numeric: tabular-nums;
}
#root-select {
    border: 1px solid var(--line);
    background: #fff;
    border-radius: 6px;
    padding: 4px 8px;
    font: inherit;
    color: var(--brown-dark);
    margin-right: 6px;
    max-width: 200px;
}

#tooltip {
    position: fixed;
    z-index: 200;
    max-width: 380px;
    max-height: 80vh;
    overflow-y: auto;
    background: var(--paper);
    border: 2px solid var(--gold);
    border-radius: 10px;
    padding: 14px 38px 14px 16px;
    box-shadow: 0 6px 24px rgba(60,40,10,0.25);
    pointer-events: none;
    direction: rtl;
}
#tooltip.pinned { pointer-events: auto; }
#tooltip:not(.pinned) .ttip-close { display: none; }
.ttip-close {
    position: absolute;
    top: 4px;
    left: 6px;
    width: 32px;
    height: 32px;
    border: none;
    background: transparent;
    font-size: 1.6rem;
    line-height: 1;
    color: var(--muted);
    cursor: pointer;
    padding: 0;
    border-radius: 6px;
    font-family: inherit;
}
.ttip-close:hover, .ttip-close:focus {
    color: var(--brown-dark);
    background: rgba(0,0,0,0.05);
    outline: none;
}
#tooltip .ttip-photo {
    display: block;
    width: 120px; height: 120px;
    object-fit: cover;
    border-radius: 10px;
    border: 2px solid var(--gold);
    margin: 0 auto 10px;
    background: #fff;
}
#tooltip h3 {
    margin: 0 0 4px;
    font-family: 'Amiri', serif;
    font-size: 1.25rem;
    color: var(--brown-dark);
}
#tooltip .ttip-en {
    color: var(--muted); font-size: 0.85rem; direction: ltr; text-align: left;
    margin-bottom: 6px;
}
#tooltip .ttip-life {
    color: var(--muted); font-size: 0.95rem; margin-bottom: 8px;
}
#tooltip dl {
    margin: 0;
    display: grid;
    grid-template-columns: max-content 1fr;
    gap: 3px 12px;
    font-size: 0.9rem;
}
#tooltip dt { color: var(--muted); font-weight: 500; }
#tooltip dd { margin: 0; color: var(--ink); }
#tooltip .ttip-notes {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--line);
    font-size: 0.85rem;
    white-space: pre-line;
    color: var(--ink);
    line-height: 1.6;
}

#hint {
    position: fixed;
    bottom: 14px; right: 14px;
    background: rgba(95,74,43,0.88);
    color: var(--paper);
    padding: 10px 16px;
    border-radius: 22px;
    font-size: 0.85rem;
    z-index: 50;
    opacity: 1;
    transition: opacity 0.5s;
    pointer-events: none;
    direction: rtl;
}
#hint.fade { opacity: 0; }

@media (max-width: 600px) {
    #controls { top: 8px; right: 8px; padding: 4px; gap: 2px; }
    #controls button { width: 32px; height: 32px; }
    #z-pct { min-width: 44px; font-size: 0.8rem; padding: 0 4px; }
    #root-select { max-width: 140px; font-size: 0.85rem; }
    #tooltip { max-width: calc(100vw - 28px); font-size: 0.85rem; }
    #hint { font-size: 0.78rem; bottom: 8px; right: 8px; padding: 8px 12px; }
}
</style>
</head>

  const viewport = document.getElementById('viewport');
  const canvas = document.getElementById('canvas');
  const zPct = document.getElementById('z-pct');
  const tooltip = document.getElementById('tooltip');
  const hint = document.getElementById('hint');

  let scale = 1, tx = 0, ty = 0;
  const MIN_SCALE = 0.1, MAX_SCALE = 5;

  function apply() {
    canvas.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + scale + ')';
    zPct.textContent = Math.round(scale * 100) + '%';
  }
  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
  function zoomAt(newScale, cx, cy) {
    newScale = clamp(newScale, MIN_SCALE, MAX_SCALE);
    const rect = viewport.getBoundingClientRect();
    const px = cx - rect.left;
    const py = cy - rect.top;
    const ratio = newScale / scale;
    tx = px - (px - tx) * ratio;
    ty = py - (py - ty) * ratio;
    scale = newScale;
    apply();
  }
  function contentSize() {
    const blocks = canvas.querySelectorAll('.tree-block');
    if (!blocks.length) return { w: 0, h: 0 };
    let w = 0, h = 0;
    blocks.forEach(b => {
      w += b.offsetWidth;
      if (b.offsetHeight > h) h = b.offsetHeight;
    });
    const gap = (blocks.length - 1) * 60;
    return { w: w + gap, h: h };
  }
  function fit() {
    const { w, h } = contentSize();
    const vw = viewport.clientWidth;
    const vh = viewport.clientHeight;
    if (w === 0 || h === 0) return;
    const pad = 80;
    const s = Math.min((vw - pad) / w, (vh - pad) / h, 1);
    scale = s;
    tx = (vw - w * s) / 2;
    ty = (vh - h * s) / 2;
    apply();
  }
  function reset() {
    scale = 1;
    const { w, h } = contentSize();
    tx = Math.max(60, (viewport.clientWidth - w) / 2);
    ty = Math.max(60, (viewport.clientHeight - h) / 2);
    apply();
  }

  let dragging = false, dragX = 0, dragY = 0, dragTx = 0, dragTy = 0, dragMoved = 0;
  viewport.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    if (e.target.closest('#controls')) return;
    dragging = true;
    dragMoved = 0;
    viewport.classList.add('dragging');
    dragX = e.clientX; dragY = e.clientY;
    dragTx = tx; dragTy = ty;
    e.preventDefault();
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx = e.clientX - dragX, dy = e.clientY - dragY;
    dragMoved = Math.max(dragMoved, Math.abs(dx), Math.abs(dy));
    tx = dragTx + dx;
    ty = dragTy + dy;
    apply();
  });
  window.addEventListener('mouseup', () => {
    if (dragging) {
      dragging = false;
      viewport.classList.remove('dragging');
      if (dragMoved > 4) suppressNextClick = true;
    }
  });

  viewport.addEventListener('wheel', e => {
    if (e.target.closest('#controls')) return;
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
    zoomAt(scale * factor, e.clientX, e.clientY);
  }, { passive: false });

  document.getElementById('z-in').addEventListener('click', () => {
    const r = viewport.getBoundingClientRect();
    zoomAt(scale * 1.25, r.left + r.width / 2, r.top + r.height / 2);
  });
  document.getElementById('z-out').addEventListener('click', () => {
    const r = viewport.getBoundingClientRect();
    zoomAt(scale / 1.25, r.left + r.width / 2, r.top + r.height / 2);
  });
  document.getElementById('z-fit').addEventListener('click', fit);
  document.getElementById('z-100').addEventListener('click', reset);

  let touchState = null;
  viewport.addEventListener('touchstart', e => {
    if (e.target.closest('#controls')) return;
    if (e.target.closest('#tooltip')) return;
    if (e.touches.length === 2) {
      const t1 = e.touches[0], t2 = e.touches[1];
      const dx = t1.clientX - t2.clientX;
      const dy = t1.clientY - t2.clientY;
      touchState = {
        kind: 'pinch',
        startDist: Math.hypot(dx, dy),
        startScale: scale,
        cx: (t1.clientX + t2.clientX) / 2,
        cy: (t1.clientY + t2.clientY) / 2,
        moved: 0,
      };
    } else if (e.touches.length === 1) {
      const t = e.touches[0];
      touchState = { kind: 'pan', startX: t.clientX, startY: t.clientY, startTx: tx, startTy: ty, moved: 0 };
    }
  }, { passive: true });
  viewport.addEventListener('touchmove', e => {
    if (!touchState) return;
    if (touchState.kind === 'pinch' && e.touches.length === 2) {
      const t1 = e.touches[0], t2 = e.touches[1];
      const dx = t1.clientX - t2.clientX;
      const dy = t1.clientY - t2.clientY;
      const dist = Math.hypot(dx, dy);
      touchState.moved = 999;
      zoomAt(touchState.startScale * (dist / touchState.startDist), touchState.cx, touchState.cy);
      e.preventDefault();
    } else if (touchState.kind === 'pan' && e.touches.length === 1) {
      const t = e.touches[0];
      const dx = t.clientX - touchState.startX, dy = t.clientY - touchState.startY;
      touchState.moved = Math.max(touchState.moved, Math.abs(dx), Math.abs(dy));
      tx = touchState.startTx + dx;
      ty = touchState.startTy + dy;
      apply();
    }
  }, { passive: false });
  viewport.addEventListener('touchend', e => {
    const st = touchState;
    touchState = null;
    if (!st) return;
    // Touch gestures are handled entirely here, so always swallow the
    // synthetic click the browser fires afterwards. (Previously a pan left
    // suppressNextClick stuck true, eating the next genuine card tap.)
    suppressNextClick = true;
    if (st.kind !== 'pan' || st.moved > 10) return;
    // A stationary single-finger tap: show or dismiss the info card directly.
    const t = e.changedTouches && e.changedTouches[0];
    if (!t) return;
    const target = document.elementFromPoint(t.clientX, t.clientY);
    if (!target || target.closest('#controls') || target.closest('#tooltip')) return;
    const card = target.closest('.node-card');
    if (card) pinFromCard(card);
    else hideTooltip();
  });

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  }
  function nameOf(id) { const p = PEOPLE[id]; return p ? esc(p.name_ar) : ''; }
  function buildTooltipHtml(p, photoSrc) {
    let h = '<button type="button" class="ttip-close" aria-label="إغلاق">×</button>';
    if (photoSrc) h += '<img class="ttip-photo" src="' + photoSrc + '" alt="">';
    h += '<h3>' + esc(p.name_ar) + '</h3>';
    if (p.name_en) h += '<div class="ttip-en">' + esc(p.name_en) + '</div>';
    if (p.life) h += '<div class="ttip-life">' + esc(p.life) + '</div>';
    h += '<dl>';
    h += '<dt>الجنس</dt><dd>' + esc(p.gender_label) + '</dd>';
    if (p.birth_date || p.birth_place) {
      let bd = '';
      if (p.birth_date) bd += esc(p.birth_date);
      if (p.birth_place) bd += (bd ? ' — ' : '') + esc(p.birth_place);
      h += '<dt>الميلاد</dt><dd>' + bd + '</dd>';
    }
    if (p.death_date || p.death_place) {
      let dd = '';
      if (p.death_date) dd += esc(p.death_date);
      if (p.death_place) dd += (dd ? ' — ' : '') + esc(p.death_place);
      h += '<dt>الوفاة</dt><dd>' + dd + '</dd>';
    }
    if (p.origin_place) h += '<dt>الأصل</dt><dd>' + esc(p.origin_place) + '</dd>';
    if (p.current_residence) h += '<dt>الإقامة</dt><dd>' + esc(p.current_residence) + '</dd>';
    if (p.occupation) h += '<dt>المهنة</dt><dd>' + esc(p.occupation) + '</dd>';
    if (p.father_id) h += '<dt>الأب</dt><dd>' + nameOf(p.father_id) + '</dd>';
    if (p.mother_id) h += '<dt>الأم</dt><dd>' + nameOf(p.mother_id) + '</dd>';
    if (p.spouse_ids && p.spouse_ids.length) {
      const label = p.gender === 'M' ? (p.spouse_ids.length > 1 ? 'الزوجات' : 'الزوجة') : 'الزوج';
      h += '<dt>' + label + '</dt><dd>' + p.spouse_ids.map(nameOf).join('، ') + '</dd>';
    }
    h += '</dl>';
    if (p.notes) h += '<div class="ttip-notes">' + esc(p.notes) + '</div>';
    return h;
  }
  let pinned = false;

  function photoSrcFromCard(card) {
    const img = card && card.querySelector('.card-photo');
    return img ? img.src : null;
  }
  function showTooltipFor(p, photoSrc) {
    tooltip.innerHTML = buildTooltipHtml(p, photoSrc);
    tooltip.hidden = false;
  }
  function hideTooltip() {
    tooltip.hidden = true;
    pinned = false;
    tooltip.classList.remove('pinned');
  }
  function positionTooltipAtCursor(x, y) {
    const margin = 14;
    const w = tooltip.offsetWidth, h = tooltip.offsetHeight;
    let left = x + margin, top = y + margin;
    if (left + w > window.innerWidth - 6) left = x - w - margin;
    if (top + h > window.innerHeight - 6) top = window.innerHeight - h - 6;
    if (left < 6) left = 6;
    if (top < 6) top = 6;
    tooltip.style.left = left + 'px';
    tooltip.style.top = top + 'px';
  }
  function positionTooltipNear(rect) {
    const margin = 12;
    tooltip.style.left = '0px'; tooltip.style.top = '0px';
    const w = tooltip.offsetWidth, h = tooltip.offsetHeight;
    const vw = window.innerWidth, vh = window.innerHeight;
    let top = rect.bottom + margin;
    let left = rect.left + (rect.width / 2) - (w / 2);
    if (top + h > vh - 6) {
      const above = rect.top - h - margin;
      if (above >= 6) {
        top = above;
      } else {
        top = Math.max(6, (vh - h) / 2);
      }
    }
    if (left + w > vw - 6) left = vw - w - 6;
    if (left < 6) left = 6;
    tooltip.style.left = left + 'px';
    tooltip.style.top = top + 'px';
  }

  const isTouchDevice = !!(window.matchMedia && window.matchMedia('(hover: none), (pointer: coarse)').matches);

  canvas.addEventListener('mouseover', e => {
    if (dragging || pinned || isTouchDevice) return;
    const node = e.target.closest('.node-card');
    if (!node) return;
    const pid = node.dataset.personId;
    const p = PEOPLE[pid];
    if (!p) return;
    showTooltipFor(p, photoSrcFromCard(node));
    positionTooltipAtCursor(e.clientX, e.clientY);
  });
  canvas.addEventListener('mousemove', e => {
    if (tooltip.hidden || pinned || isTouchDevice) return;
    positionTooltipAtCursor(e.clientX, e.clientY);
  });
  canvas.addEventListener('mouseout', e => {
    if (pinned || isTouchDevice) return;
    const node = e.target.closest('.node-card');
    if (!node) return;
    if (e.relatedTarget && node.contains(e.relatedTarget)) return;
    tooltip.hidden = true;
  });

  function pinFromCard(card) {
    const pid = card.dataset.personId;
    const p = PEOPLE[pid];
    if (!p) return;
    showTooltipFor(p, photoSrcFromCard(card));
    pinned = true;
    tooltip.classList.add('pinned');
    positionTooltipNear(card.getBoundingClientRect());
  }

  let suppressNextClick = false;
  canvas.addEventListener('click', e => {
    if (suppressNextClick) { suppressNextClick = false; return; }
    const card = e.target.closest('.node-card');
    if (card) {
      e.stopPropagation();
      pinFromCard(card);
    } else {
      hideTooltip();
    }
  });

  tooltip.addEventListener('click', e => {
    if (e.target.closest('.ttip-close')) {
      e.stopPropagation();
      hideTooltip();
    }
  });

  document.addEventListener('click', e => {
    if (e.target.closest('#viewport')) return;
    if (e.target.closest('#tooltip')) return;
    if (e.target.closest('#controls')) return;
    hideTooltip();
  });

  const rootSelect = document.getElementById('root-select');
  if (rootSelect) {
    rootSelect.addEventListener('change', () => {
      const rid = rootSelect.value;
      const block = canvas.querySelector('.tree-block[data-root-id="' + rid + '"]');
      if (!block) return;
      const blockLeft = block.offsetLeft;
      const blockTop = block.offsetTop;
      const bw = block.offsetWidth, bh = block.offsetHeight;
      const vw = viewport.clientWidth, vh = viewport.clientHeight;
      const s = Math.min((vw - 80) / bw, (vh - 80) / bh, 1);
      scale = s;
      tx = -blockLeft * s + (vw - bw * s) / 2;
      ty = -blockTop * s + (vh - bh * s) / 2;
      apply();
    });
  }

  function init() {
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(fit);
    } else {
      setTimeout(fit, 200);
    }
  }
  init();

  setTimeout(() => { if (hint) hint.classList.add('fade'); }, 6000);
  setTimeout(() => { if (hint) hint.remove(); }, 7000);

  window.addEventListener('keydown', e => {
    if (e.target.matches('input, select, textarea')) return;
    if (e.key === '+' || e.key === '=') { document.getElementById('z-in').click(); }
    else if (e.key === '-' || e.key === '_') { document.getElementById('z-out').click(); }
    else if (e.key === '0') { reset(); }
    else if (e.key === 'f' || e.key === 'F') { fit(); }
  });
})();
</script>
</body>
</html>
